# make-action
name: '🛠️ Runs make'
description: 'Executes the steps described in a Makefile'

inputs:
  # Optional
  repository:
    # Uses actions/checkout to clone the repository
    description: 'Remote Git repository URL to download'
    required: false
  path:
    description: 'Download the repository to this local filesystem path'
    required: false
  make_args:
    description: 'Arguments/flags sent to make command'
    required: false
  debug:
    description: 'Set true to enable additional diagnostic output'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 'Clone repository'
      if: inputs.repository != ''
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: "${{ inputs.repository }}"
        path: "${{ inputs.path }}"
        persist-credentials: false

    - name: 'Setup action/environment'
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository }}
        REPO_PATH: ${{ inputs.path }}
        MAKE_ARGS: ${{ inputs.make_args }}
        DEBUG: ${{ inputs.debug }}
      run: |
        # Setup action/environment

        make_cmd=$(which make)
        if [ ! -x "$make_cmd" ]; then
          echo 'Error: make command not found ❌'
          exit 1
        fi

        # Set build parameters/variables
        echo "Action triggered by: ${GITHUB_TRIGGERING_ACTOR}"
        datetime=$(date +'%Y-%m-%d-%H%M')
        echo "Date and time stamp: $datetime"

        if [ -n "$REPO_PATH" ] && \
          [ -z "$MAKE_ARGS" ]; then
          echo 'Repository downloaded to non-local path ⚠️'
          echo "Suggested make_args: -C $REPO_PATH"
          # make_args is intentionally expanded unquoted (word-split)
          # when make is invoked, so a path containing whitespace
          # cannot be represented; flag that explicitly rather than
          # implying shell quoting would help.
          case "$REPO_PATH" in
            *[[:space:]]*)
              echo "Note: make_args uses unquoted word-splitting;" \
                "paths containing spaces are not supported" ;;
          esac
        fi

        # Output build heading
        echo '# 🔨 Make Action' >> "$GITHUB_STEP_SUMMARY"
        echo "Directory: $PWD" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "$REPOSITORY" ]; then
          echo "Repository: $REPOSITORY" \
            >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -n "$REPO_PATH" ]; then
          echo "Path: $REPO_PATH" >> "$GITHUB_STEP_SUMMARY"
        fi

        debug_lower=$(echo "$DEBUG" | tr '[:upper:]' '[:lower:]')
        if [ "f$debug_lower" = 'ftrue' ]; then
          echo '🐞 Running: find . -name Makefile'
          find . -name Makefile
        fi

        # Automatically include -C option when make_args empty and path given
        if [ -z "$MAKE_ARGS" ] && \
          [ -n "$REPO_PATH" ]; then
          make_args="-C $REPO_PATH"
        else
          make_args="$MAKE_ARGS"
        fi

        if "$make_cmd" $make_args; then
          echo "Success: $make_cmd $make_args ✅" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "Failed: $make_cmd $make_args ❌" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
